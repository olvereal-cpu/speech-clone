{% extends "base.html" %}
{% block content %}
<main class="max-w-4xl mx-auto px-4 py-12">
    <section class="bg-white rounded-[40px] shadow-xl p-8 md:p-12 border border-gray-50">
        <textarea id="text" maxlength="2000" class="w-full h-64 p-6 bg-gray-50 border border-gray-100 rounded-[30px] outline-none text-lg resize-none font-medium" placeholder="Введите текст..."></textarea>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
            <select id="voiceSelect" class="w-full p-5 bg-gray-50 border rounded-2xl outline-none font-bold text-gray-700">
                <option value="ru-RU-DmitryNeural">Дмитрий (Мужской)</option>
                <option value="ru-RU-SvetlanaNeural">Светлана (Женский)</option>
            </select>
            <select id="modeSelect" class="w-full p-5 bg-gray-50 border rounded-2xl outline-none font-bold text-gray-700">
                <option value="natural">Обычный темп</option>
                <option value="slow">Медленно</option>
                <option value="fast">Быстро</option>
            </select>
        </div>

        <button onclick="generateAudio()" id="genBtn" class="w-full mt-8 h-[62px] bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-black transition-all">Озвучить</button>

        <div id="resultSection" class="mt-12 hidden p-8 bg-blue-50 rounded-[40px] border border-blue-100 text-center">
            <audio id="audioPlayer" controls class="w-full mb-8"></audio>
            <button id="downloadBtn" class="px-16 py-6 bg-green-500 text-white font-black rounded-[25px] hover:bg-black transition-all uppercase tracking-widest text-sm">Скачать MP3</button>
        </div>
    </section>
</main>

<script>
async function generateAudio() {
    const btn = document.getElementById('genBtn');
    const text = document.getElementById('text').value;
    const voice = document.getElementById('voiceSelect').value;
    const mode = document.getElementById('modeSelect').value;

    if(!text.trim()) return alert("Введите текст");
    btn.disabled = true; btn.innerText = "Генерируем...";

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice, mode })
        });
        const data = await response.json();
        if(data.audio_url) {
            document.getElementById('audioPlayer').src = data.audio_url;
            document.getElementById('resultSection').classList.remove('hidden');
            const fileName = data.audio_url.split('/').pop();
            document.getElementById('downloadBtn').onclick = () => { window.location.href = `/download-page?file=${fileName}`; };
        }
    } catch (e) { alert("Ошибка сервера"); }
    finally { btn.disabled = false; btn.innerText = "Озвучить"; }
}
</script>
{% endblock %}
