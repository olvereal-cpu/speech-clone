{% extends "base.html" %}
{% block content %}
<main class="max-w-5xl mx-auto px-6 py-12">
    <div class="mb-10 text-center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2792779022553212" data-ad-slot="54321" data-ad-format="horizontal"></ins></div>

    <section class="bg-white rounded-[50px] shadow-2xl p-8 md:p-16 border mb-20">
        <h1 class="text-5xl font-black text-center mb-10 uppercase tracking-tighter">SpeechClone <span class="text-blue-600">AI</span></h1>
        <textarea id="text" maxlength="2000" class="w-full h-64 p-8 bg-gray-50 border rounded-[35px] outline-none text-xl resize-none font-medium focus:ring-4 focus:ring-blue-50 transition-all" placeholder="Ваш текст для озвучки..."></textarea>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
            <select id="voiceSelect" class="p-5 bg-gray-50 border rounded-2xl font-bold text-gray-700">
                <optgroup label="Русские">
                    <option value="ru-RU-DmitryNeural">Дмитрий 🇷🇺</option>
                    <option value="ru-RU-SvetlanaNeural">Светлана 🇷🇺</option>
                    <option value="ru-RU-YuryNeural">Юрий 🇷🇺</option>
                </optgroup>
                <optgroup label="Иностранные (Premium)">
                    <option value="en-US-AvaNeural">Ava 🇺🇸</option>
                    <option value="en-US-GuyNeural">Guy 🇺🇸</option>
                    <option value="en-GB-SoniaNeural">Sonia 🇬🇧</option>
                    <option value="de-DE-KatjaNeural">Katja 🇩🇪</option>
                    <option value="fr-FR-DeniseNeural">Denise 🇫🇷</option>
                    <option value="zh-CN-YunxiNeural">Yunxi 🇨🇳</option>
                    <option value="ja-JP-NanamiNeural">Nanami 🇯🇵</option>
                    <option value="kk-KZ-DauletNeural">Даулет 🇰🇿</option>
                </optgroup>
            </select>
            <select id="modeSelect" class="p-5 bg-gray-50 border rounded-2xl font-bold text-gray-700">
                <option value="natural">Естественный</option>
                <option value="slow">Медленно</option>
                <option value="fast">Быстро</option>
            </select>
        </div>

        <button onclick="generateAudio()" id="genBtn" class="w-full mt-10 h-20 bg-blue-600 text-white rounded-[25px] font-black uppercase text-lg shadow-xl hover:bg-black transition-all">Сгенерировать MP3</button>

        <div id="resultSection" class="mt-12 hidden p-10 bg-blue-50 rounded-[40px] border border-blue-100 animate-fade-in text-center">
            <audio id="audioPlayer" controls class="w-full mb-8"></audio>
            <button id="downloadBtn" class="px-20 py-6 bg-green-500 text-white font-black rounded-[25px] hover:bg-black transition-all">СКАЧАТЬ ФАЙЛ</button>
        </div>
    </section>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <a href="/blog/kak-озвучить-текст" class="bg-white p-8 rounded-[40px] border shadow-sm hover:shadow-xl transition-all">
            <div class="h-2 w-10 bg-blue-600 mb-4 rounded-full"></div>
            <h3 class="font-black text-xl mb-4 leading-tight">Как озвучить текст бесплатно?</h3>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Читать гайд →</p>
        </a>
        <a href="/blog/ai-voices-review" class="bg-white p-8 rounded-[40px] border shadow-sm hover:shadow-xl transition-all">
            <div class="h-2 w-10 bg-green-500 mb-4 rounded-full"></div>
            <h3 class="font-black text-xl mb-4 leading-tight">Обзор голосов Microsoft Edge</h3>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Читать обзор →</p>
        </a>
        <a href="/blog/automation-youtube" class="bg-white p-8 rounded-[40px] border shadow-sm hover:shadow-xl transition-all">
            <div class="h-2 w-10 bg-red-500 mb-4 rounded-full"></div>
            <h3 class="font-black text-xl mb-4 leading-tight">Автоматизация YouTube каналов</h3>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Стратегия 2026 →</p>
        </a>
    </div>
</main>

<script>
async function generateAudio() {
    const btn = document.getElementById('genBtn');
    const text = document.getElementById('text').value;
    const voice = document.getElementById('voiceSelect').value;
    const mode = document.getElementById('modeSelect').value;
    if(!text.trim()) return alert("Введите текст");
    btn.disabled = true; btn.innerText = "ГЕНЕРАЦИЯ...";
    const res = await fetch('/api/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, voice, mode})});
    const data = await res.json();
    if(data.audio_url) {
        document.getElementById('audioPlayer').src = data.audio_url;
        document.getElementById('resultSection').classList.remove('hidden');
        document.getElementById('downloadBtn').onclick = () => { window.location.href = `/download-page?file=${data.audio_url.split('/').pop()}`; };
    }
    btn.disabled = false; btn.innerText = "Сгенерировать MP3";
}
</script>
{% endblock %}
