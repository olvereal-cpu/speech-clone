{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 py-12 animate-fade-in">
    <!-- Твой заголовок -->
    <div class="text-center mb-16">
        <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter text-gray-900 uppercase">
            Озвучка <span class="text-blue-600">Нейросетью</span>
        </h1>
        <p class="text-gray-500 font-bold uppercase text-[10px] tracking-[0.4em]">Бесплатный сервис синтеза речи онлайн</p>
    </div>

    <!-- Основной блок озвучки -->
    <div class="bg-white rounded-[40px] shadow-2xl p-6 md:p-12 border border-gray-100 mb-12">
        <textarea id="text-input" class="w-full h-64 p-8 bg-gray-50 border-none rounded-[30px] focus:ring-4 focus:ring-blue-100 text-xl font-medium mb-8 resize-none transition-all" placeholder="Введите текст здесь... Используйте + перед гласной для уд+арения."></textarea>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <select id="voice-select" class="bg-gray-100 p-5 rounded-2xl font-black text-[11px] uppercase tracking-widest outline-none border-2 border-transparent focus:border-blue-600 transition-all">
                <!-- РУССКИЕ ГОЛОСА -->
                <optgroup label="Русский (RU)">
                    <option value="ru-RU-SvetlanaNeural">Светлана (Женский)</option>
                    <option value="ru-RU-DmitryNeural">Дмитрий (Мужской)</option>
                    <option value="ru-RU-DariyaNeural">Дарья (Женский)</option>
                </optgroup>
                <!-- АНГЛИЙСКИЕ ГОЛОСА -->
                <optgroup label="English (US/UK)">
                    <option value="en-US-GuyNeural">Guy (Male - US)</option>
                    <option value="en-US-JennyNeural">Jenny (Female - US)</option>
                    <option value="en-GB-SoniaNeural">Sonia (Female - UK)</option>
                    <option value="en-GB-RyanNeural">Ryan (Male - UK)</option>
                </optgroup>
                <!-- КАЗАХСКИЕ ГОЛОСА -->
                <optgroup label="Қазақша (KZ)">
                    <option value="kk-KZ-AigulNeural">Айгүл (Әйел)</option>
                    <option value="kk-KZ-DauletNeural">Дәулет (Ер)</option>
                </optgroup>
            </select>
            
            <select id="mode-select" class="bg-gray-100 p-5 rounded-2xl font-black text-[11px] uppercase tracking-widest outline-none border-2 border-transparent focus:border-blue-600 transition-all">
                <option value="natural">Обычный темп</option>
                <option value="slow">Замедленный (-20%)</option>
                <option value="fast">Ускоренный (+20%)</option>
            </select>

            <button onclick="generateAudio()" id="gen-btn" class="bg-blue-600 text-white font-black uppercase tracking-[0.2em] py-5 rounded-2xl hover:bg-black transition-all shadow-xl shadow-blue-200 text-xs">Озвучить текст</button>
        </div>

        <!-- Плеер и кнопка перехода -->
        <div id="result-audio" class="hidden mt-10 p-8 bg-blue-50 rounded-[30px] flex flex-col items-center border-2 border-blue-100">
            <audio id="player" controls class="w-full mb-6"></audio>
            <button onclick="goToDownload()" class="bg-black text-white px-10 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 transition-all">Перейти к скачиванию</button>
        </div>
    </div>

    <!-- Твой чат-виджет Спич-Бро -->
    <div class="bg-gray-900 rounded-[40px] p-8 md:p-12 text-white shadow-2xl relative overflow-hidden">
        <div class="flex items-center gap-4 mb-8">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
            </span>
            <h2 class="font-black uppercase tracking-[0.3em] text-[11px]">Спич-Бро ИИ Помощник</h2>
        </div>
        <div id="chat-box" class="h-48 overflow-y-auto mb-6 text-gray-400 text-sm font-medium space-y-4 pr-4">
            <p class="bg-white/5 p-4 rounded-2xl inline-block">👋 Йо! Я — Спич-Бро. Помогу с текстом или ударениями. Что делаем?</p>
        </div>
        <div class="flex gap-3 bg-white/5 p-2 rounded-[25px]">
            <input id="chat-input" type="text" class="flex-1 bg-transparent border-none p-4 text-white placeholder-gray-600 focus:ring-0" placeholder="Напиши мне что-нибудь...">
            <button onclick="sendChat()" class="bg-blue-600 text-white px-8 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-white hover:text-black transition-all">Отправить</button>
        </div>
    </div>
</div>

<script>
let currentAudioUrl = "";

async function generateAudio() {
    const btn = document.getElementById('gen-btn');
    const text = document.getElementById('text-input').value;
    const voice = document.getElementById('voice-select').value;
    const mode = document.getElementById('mode-select').value;

    if (!text) {
        alert("Бро, введи хоть какой-то текст!");
        return;
    }

    btn.innerText = "ГЕНЕРАЦИЯ...";
    btn.disabled = true;

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text, voice, mode})
        });
        const data = await response.json();
        
        if (data.audio_url) {
            currentAudioUrl = data.audio_url;
            document.getElementById('result-audio').classList.remove('hidden');
            document.getElementById('player').src = data.audio_url;
            document.getElementById('player').play();
        }
    } catch (e) {
        alert("Ошибка связи с сервером");
    } finally {
        btn.innerText = "ОЗВУЧИТЬ ТЕКСТ";
        btn.disabled = false;
    }
}

function goToDownload() {
    if (!currentAudioUrl) return;
    const fileName = currentAudioUrl.split('/').pop();
    window.location.href = `/download?file=${fileName}`;
}

async function sendChat() {
    const input = document.getElementById('chat-input');
    const box = document.getElementById('chat-box');
    const text = input.value;
    if (!text) return;

    box.innerHTML += `<div class="text-right"><p class="bg-blue-600 text-white p-4 rounded-2xl inline-block"><b>Ты:</b> ${text}</p></div>`;
    input.value = "";
    box.scrollTop = box.scrollHeight;

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        const data = await response.json();
        box.innerHTML += `<div><p class="bg-white/5 p-4 rounded-2xl inline-block text-blue-400"><b>Бро:</b> ${data.reply}</p></div>`;
        box.scrollTop = box.scrollHeight;
    } catch (e) {
        box.innerHTML += `<p class="text-red-400 text-xs uppercase font-black">Связь потеряна...</p>`;
    }
}

document.getElementById('chat-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') sendChat();
});
</script>
{% endblock %}
