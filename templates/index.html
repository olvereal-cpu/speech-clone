{% extends "base.html" %}

{% block content %}
<main class="max-w-4xl mx-auto px-4 py-12">
    <!-- Секция озвучки -->
    <section class="bg-white rounded-[40px] shadow-xl p-8 md:p-12 border border-gray-50 animate-fade-in">
        <textarea id="textInput" maxlength="2000" class="w-full h-64 p-6 bg-gray-50 border border-gray-100 rounded-[30px] outline-none focus:ring-4 focus:ring-blue-100 text-lg resize-none transition-all font-medium" placeholder="Введите текст для озвучки..."></textarea>
        
        <div class="text-right pr-6 -mt-10 relative z-10">
            <span id="charCount" class="text-[10px] font-black text-gray-400 bg-white/90 px-3 py-1.5 rounded-xl shadow-sm border border-gray-100 uppercase tracking-widest">0 / 2000</span>
        </div>

        <div class="mt-8 flex flex-col md:flex-row gap-6 items-end justify-between">
            <div class="w-full md:w-1/2">
                <label class="text-[10px] font-black text-gray-400 uppercase mb-3 block tracking-[0.2em] ml-2">Выберите голос (Все доступные)</label>
                <select id="voiceSelect" class="w-full p-4 bg-white border border-gray-200 rounded-2xl outline-none shadow-sm font-bold text-gray-700 cursor-pointer focus:border-blue-500 transition-all mb-4">
                    
                    <optgroup label="🇷🇺 Русский (Russian)">
                        <option value="ru-RU-DmitryNeural">Дмитрий (Мужской) — Естественный</option>
                        <option value="ru-RU-SvetlanaNeural">Светлана (Женский) — Приятный</option>
                        <option value="ru-RU-DariyaNeural">Дарья (Женский) — Четкий</option>
                        <option value="ru-RU-EkaterinaNeural">Екатерина (Женский) — Эмоциональный</option>
                    </optgroup>

                    <optgroup label="🇰🇿 Қазақша (Kazakh)">
                        <option value="kk-KZ-AigulNeural">Айгүл (Женский)</option>
                        <option value="kk-KZ-DauletNeural">Дәулет (Мужской)</option>
                    </optgroup>

                    <optgroup label="🇺🇸 English (US)">
                        <option value="en-US-GuyNeural">Guy (Male)</option>
                        <option value="en-US-JennyNeural">Jenny (Female)</option>
                        <option value="en-US-AriaNeural">Aria (Female)</option>
                        <option value="en-US-ChristopherNeural">Christopher (Male)</option>
                        <option value="en-US-EricNeural">Eric (Male)</option>
                        <option value="en-US-MichelleNeural">Michelle (Female)</option>
                        <option value="en-US-RogerNeural">Roger (Male)</option>
                    </optgroup>

                    <optgroup label="🇬🇧 English (UK)">
                        <option value="en-GB-SoniaNeural">Sonia (Female)</option>
                        <option value="en-GB-RyanNeural">Ryan (Male)</option>
                        <option value="en-GB-LibbyNeural">Libby (Female)</option>
                    </optgroup>

                    <optgroup label="🇩🇪 Deutsch (German)">
                        <option value="de-DE-ConradNeural">Conrad (Male)</option>
                        <option value="de-DE-KatjaNeural">Katja (Female)</option>
                        <option value="de-DE-KillianNeural">Killian (Male)</option>
                    </optgroup>

                    <optgroup label="🇫🇷 Français (French)">
                        <option value="fr-FR-DeniseNeural">Denise (Female)</option>
                        <option value="fr-FR-HenriNeural">Henri (Male)</option>
                    </optgroup>

                    <optgroup label="🇪🇸 Español (Spanish)">
                        <option value="es-ES-AlvaroNeural">Alvaro (Male)</option>
                        <option value="es-ES-ElviraNeural">Elvira (Female)</option>
                    </optgroup>

                    <optgroup label="🇮🇹 Italiano (Italian)">
                        <option value="it-IT-DiegoNeural">Diego (Male)</option>
                        <option value="it-IT-ElsaNeural">Elsa (Female)</option>
                    </optgroup>

                    <optgroup label="🇹🇷 Türkçe (Turkish)">
                        <option value="tr-TR-AhmetNeural">Ahmet (Male)</option>
                        <option value="tr-TR-EmelNeural">Emel (Female)</option>
                    </optgroup>

                    <optgroup label="🇺🇦 Українська (Ukrainian)">
                        <option value="uk-UA-OstapNeural">Остап (Чоловічий)</option>
                        <option value="uk-UA-PolinaNeural">Поліна (Жіночий)</option>
                    </optgroup>

                    <optgroup label="🇵🇱 Polski (Polish)">
                        <option value="pl-PL-MarekNeural">Marek (Male)</option>
                        <option value="pl-PL-ZofiaNeural">Zofia (Female)</option>
                    </optgroup>
                </select>

                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer"><input type="radio" name="mode" value="natural" class="peer hidden" checked><div class="peer-checked:bg-blue-600 peer-checked:text-white bg-gray-100 text-gray-500 py-3 rounded-xl text-center text-[10px] font-black uppercase transition-all">Natural</div></label>
                    <label class="cursor-pointer"><input type="radio" name="mode" value="slow" class="peer hidden"><div class="peer-checked:bg-blue-600 peer-checked:text-white bg-gray-100 text-gray-500 py-3 rounded-xl text-center text-[10px] font-black uppercase transition-all">Slow</div></label>
                    <label class="cursor-pointer"><input type="radio" name="mode" value="fast" class="peer hidden"><div class="peer-checked:bg-blue-600 peer-checked:text-white bg-gray-100 text-gray-500 py-3 rounded-xl text-center text-[10px] font-black uppercase transition-all">Fast</div></label>
                </div>
            </div>

            <button id="mainBtn" onclick="generateAudio()" class="w-full md:w-auto px-12 py-5 bg-blue-600 text-white rounded-[25px] font-black uppercase text-xs tracking-widest hover:bg-black transition-all shadow-lg shadow-blue-100">Озвучить</button>
        </div>

        <div id="resultSection" class="hidden mt-10 p-6 bg-blue-50 rounded-[30px] border border-blue-100 animate-fade-in text-center">
            <audio id="audioPlayer" controls class="w-full mb-4"></audio>
            <a id="downloadBtn" href="#" download class="inline-block px-8 py-4 bg-black text-white rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-blue-600 transition-all">Скачать MP3</a>
        </div>
    </section>

    <!-- Инфо-блоки -->
    <section class="mt-20 grid md:grid-cols-3 gap-8">
        <div class="bg-white p-8 rounded-[30px] border border-gray-100 shadow-sm"><div class="text-blue-600 mb-4 text-2xl">⚡️</div><h3 class="font-black uppercase text-xs tracking-widest mb-2">Мгновенно</h3><p class="text-gray-500 text-sm leading-relaxed">Генерация речи занимает считанные секунды.</p></div>
        <div class="bg-white p-8 rounded-[30px] border border-gray-100 shadow-sm"><div class="text-blue-600 mb-4 text-2xl">🎧</div><h3 class="font-black uppercase text-xs tracking-widest mb-2">Живые голоса</h3><p class="text-gray-500 text-sm leading-relaxed">Все современные нейросети в одном интерфейсе.</p></div>
        <div class="bg-white p-8 rounded-[30px] border border-gray-100 shadow-sm"><div class="text-blue-600 mb-4 text-2xl">🆓</div><h3 class="font-black uppercase text-xs tracking-widest mb-2">Бесплатно</h3><p class="text-gray-500 text-sm leading-relaxed">2000 символов за одну генерацию без оплаты.</p></div>
    </section>
</main>

<!-- ЧАТ-ВИДЖЕТ -->
<div id="chat-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
    <div id="chat-window" class="hidden w-80 h-96 bg-white rounded-[30px] shadow-2xl border border-gray-100 mb-4 flex flex-col overflow-hidden animate-fade-in">
        <div class="bg-blue-600 p-4 text-white font-black text-[10px] uppercase tracking-widest flex justify-between">
            <span>AI Помощник</span>
            <button onclick="toggleChat()">×</button>
        </div>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto text-sm space-y-4 bg-gray-50"></div>
        <div class="p-4 border-t border-gray-100 flex gap-2">
            <input id="chat-input" type="text" class="flex-1 bg-gray-100 border-none rounded-xl px-3 py-2 text-xs outline-none" placeholder="Спросите об озвучке...">
            <button onclick="handleChat()" class="bg-blue-600 text-white p-2 rounded-xl text-xs font-bold">></button>
        </div>
    </div>
    <button onclick="toggleChat()" class="bg-black text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center hover:scale-110 transition-all">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.827-1.24L3 20l1.326-3.945A7.821 7.821 0 013 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
    </button>
</div>

<script>
// --- ЛОГИКА ОЗВУЧКИ ---
const textInput = document.getElementById('textInput');
textInput.addEventListener('input', () => {
    document.getElementById('charCount').innerText = `${textInput.value.length} / 2000`;
});

async function generateAudio() {
    const btn = document.getElementById('mainBtn');
    const text = textInput.value.trim();
    const voice = document.getElementById('voiceSelect').value;
    const mode = document.querySelector('input[name="mode"]:checked').value;

    if (!text) { alert("Введите текст"); return; }
    btn.disabled = true; btn.innerText = "Генерируем...";

    try {
        const res = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice, mode })
        });
        const data = await res.json();
        if (data.audio_url) {
            const player = document.getElementById('audioPlayer');
            player.src = data.audio_url;
            document.getElementById('downloadBtn').href = data.audio_url;
            document.getElementById('resultSection').classList.remove('hidden');
            player.play();
        } else {
            alert("Ошибка сервера: " + (data.detail || "Неизвестная ошибка"));
        }
    } catch (e) {
        alert("Ошибка сети. Проверьте соединение.");
    } finally {
        btn.disabled = false; btn.innerText = "Озвучить";
    }
}

// --- ЛОГИКА ЧАТА ---
function toggleChat() { document.getElementById('chat-window').classList.toggle('hidden'); }
async function handleChat() {
    const input = document.getElementById('chat-input');
    const container = document.getElementById('chat-messages');
    const text = input.value.trim();
    if (!text) return;

    container.innerHTML += `<div class="bg-blue-100 p-3 rounded-2xl ml-8 text-[11px] font-medium">${text}</div>`;
    input.value = '';

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        container.innerHTML += `<div class="bg-white p-3 rounded-2xl mr-8 shadow-sm border border-gray-100 text-[11px] leading-relaxed">${data.response}</div>`;
        container.scrollTop = container.scrollHeight;
    } catch (e) {
        container.innerHTML += `<div class="text-red-500 text-[10px]">Ошибка бота</div>`;
    }
}
</script>
{% endblock %}
