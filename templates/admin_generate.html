<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель | Контент-Завод</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white rounded-[40px] shadow-2xl p-10 border border-gray-100">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl">✍️</div>
            <div>
                <h1 class="text-2xl font-black text-gray-900 uppercase">Генератор Блога</h1>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Powered by Gemini 3.1 Flash-Lite</p>
            </div>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-black uppercase text-gray-500 mb-2 ml-1">Тема новой статьи</label>
                <input type="text" id="topic" placeholder="Например: Как ИИ пишет музыку..." 
                       class="w-full p-5 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none transition-all font-medium">
            </div>

            <button onclick="generatePost()" id="genBtn" 
                    class="w-full py-5 bg-gray-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all uppercase tracking-widest text-sm shadow-xl">
                Создать магию ✨
            </button>

            <div id="status" class="hidden p-4 rounded-2xl text-center font-bold text-sm"></div>
        </div>

        <div class="mt-10 pt-10 border-t border-gray-100 flex justify-between items-center">
            <a href="/" class="text-gray-400 hover:text-gray-900 text-xs font-black uppercase tracking-widest transition-colors">← На сайт</a>
            <span class="text-[10px] text-gray-300 font-bold uppercase tracking-widest italic">Admin Mode v1.2</span>
        </div>
    </div>

    <script>
        async function generatePost() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');

            if (!topic) return alert("Введите тему, бро!");

            btn.disabled = true;
            btn.innerText = "Gemini думает... 🧠";
            status.classList.add('hidden');

            try {
                const response = await fetch('/api/admin/generate-post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: topic })
                });

                const data = await response.json();
                
                if (response.ok) {
                    status.innerText = "✅ Статья успешно добавлена в блог!";
                    status.className = "p-4 rounded-2xl text-center font-bold text-sm bg-green-50 text-green-600 block";
                    document.getElementById('topic').value = "";
                } else {
                    throw new Error(data.error || "Ошибка сервера");
                }
            } catch (e) {
                status.innerText = "❌ Ошибка: " + e.message;
                status.className = "p-4 rounded-2xl text-center font-bold text-sm bg-red-50 text-red-600 block";
            } finally {
                btn.disabled = false;
                btn.innerText = "Создать магию ✨";
            }
        }
    </script>
</body>
</html>
