<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpeechClone{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --text: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        header { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        nav { display: flex; gap: 20px; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: white; }
        nav a.active { color: var(--primary); }
        .stars-btn { color: #fbbf24 !important; font-weight: bold; }

        footer { text-align: center; padding: 3rem; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 50px; color: #64748b; }
        
        {% block style %}{% endblock %}
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">SpeechClone</a>
    <nav>
        <a href="/">Главная</a>
        <a href="/about">О нас</a>
        <a href="/services">Услуги</a>
        <a href="/blog/index">Блог</a>
        <a href="/faq">FAQ</a>
        <a href="/api-docs">API</a>
        <a href="/contacts">Контакты</a>
        <a href="/donate" class="stars-btn">⭐ Донат</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 SpeechClone Open Source Project. Все права защищены.
</footer>

</body>
</html>
