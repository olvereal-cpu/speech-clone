<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpeechClone | Open Source AI{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --p: #6366f1; 
            --bg: #0f172a; 
            --g: rgba(255,255,255,0.05); 
            --border: rgba(255,255,255,0.1); 
        }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif, system-ui; 
            background: var(--bg); 
            color: white; 
            line-height: 1.6; 
        }

        /* Навигация (8 пунктов) */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 15px 5%; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid var(--border); 
        }
        
        .logo { 
            font-weight: 800; 
            font-size: 1.4rem; 
            color: var(--p); 
            text-decoration: none; 
        }

        .menu { display: flex; gap: 18px; }
        .menu a { 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.85rem; 
            transition: 0.3s; 
        }
        .menu a:hover { color: white; }
        .menu a.stars-btn { color: #fbbf24; font-weight: bold; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        footer { 
            text-align: center; 
            padding: 60px; 
            color: #475569; 
            border-top: 1px solid var(--border); 
            margin-top: 50px; 
            font-size: 0.9rem;
        }

        /* Стили для сетки и карточек, которые будут в index.html */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; 
        }
        
        .card { 
            background: var(--g); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            transition: 0.3s; 
        }

        .price-card { 
            background: rgba(255,255,255,0.03); 
            padding: 30px 25px; 
            border-radius: 18px; 
            border: 1px solid var(--border); 
            text-align: left; /* Текст слева по просьбе */
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .price-card:hover { border-color: var(--p); }
        .price-card h4 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .price-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; min-height: 40px; }

        .btn { 
            background: var(--p); 
            color: white; 
            padding: 10px 22px; 
            border-radius: 10px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: bold; 
            font-size: 0.9rem;
            width: fit-content;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        {% block style %}{% endblock %}
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">SpeechClone</a>
    <div class="menu">
        <a href="/">Главная</a>
        <a href="/about">О проекте</a>
        <a href="/services">Услуги</a>
        <a href="/blog/main">Блог</a>
        <a href="/faq">FAQ</a>
        <a href="/api-docs">API</a>
        <a href="/contacts">Контакты</a>
        <a href="/donate" class="stars-btn">⭐ Донат</a>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 SpeechClone Online. Open Source Initiative.
</footer>

</body>
</html>
