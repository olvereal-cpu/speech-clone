{% extends "base.html" %}
{% block content %}
<main class="max-w-4xl mx-auto px-4 py-8 text-center flex flex-col items-center">
    <div class="bg-white rounded-[40px] shadow-xl p-10 md:p-16 border border-gray-50 w-full flex flex-col items-center">
        <h1 id="main-title" class="text-3xl font-black text-gray-900 uppercase mb-12">Ваш файл готов!</h1>

        <div id="timer-container" class="relative flex items-center justify-center mb-6" style="width: 200px; height: 200px;">
            <svg class="w-full h-full rotate-[-90deg]">
                <circle cx="100" cy="100" r="90" stroke="#f3f4f6" stroke-width="12" fill="transparent"/>
                <circle id="progress-bar" cx="100" cy="100" r="90" stroke="#2563eb" stroke-width="12" fill="transparent" stroke-dasharray="565.48" stroke-dashoffset="565.48" style="transition: stroke-dashoffset 1s linear;"/>
            </svg>
            <div class="absolute text-4xl font-black text-gray-900" id="countdown">30</div>
        </div>

        <p id="wait-text" class="text-[10px] uppercase tracking-widest text-gray-400 mb-8 font-black">Формируем прямую ссылку...</p>

        <div id="download-block" class="hidden w-full">
            <a href="{{ file_url }}" download class="px-16 py-6 bg-green-500 text-white font-black rounded-[25px] hover:bg-black transition-all uppercase tracking-widest text-sm inline-block">
                Скачать MP3 файл
            </a>
        </div>
    </div>
</main>

<script>
    let timeLeft = 30;
    const circumference = 565.48; 
    const progressBar = document.getElementById('progress-bar');

    const timer = setInterval(() => {
        timeLeft--;
        if (timeLeft >= 0) {
            document.getElementById('countdown').innerText = timeLeft;
            const offset = circumference - ( (30 - timeLeft) / 30) * circumference;
            progressBar.style.strokeDashoffset = offset;
        }
        if (timeLeft <= 0) {
            clearInterval(timer);
            document.getElementById('timer-container').classList.add('hidden');
            document.getElementById('wait-text').classList.add('hidden');
            document.getElementById('main-title').innerText = "Ссылка создана!";
            document.getElementById('download-block').classList.remove('hidden');
        }
    }, 1000);
</script>
{% endblock %}
