{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto py-12 px-4">
    <div class="text-center mb-10">
        <h1 class="text-5xl font-black text-slate-800 tracking-tight">
            🎥 <span class="text-blue-600 italic">VIDEO & AUDIO</span> DUBBING
        </h1>
        <p class="text-slate-500 mt-2 text-lg font-medium">Клонирование голоса и дубляж персонажей</p>
    </div>

    <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
        <form id="dubForm" class="space-y-6">
            <div class="relative group border-4 border-dashed border-slate-100 rounded-3xl p-12 text-center hover:bg-blue-50/50 hover:border-blue-200 transition-all cursor-pointer">
                <input type="file" id="mediaFile" name="file" accept="audio/*,video/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="updateFileName()">
                <div class="text-blue-600">
                    <span class="text-6xl mb-4 block group-hover:scale-110 transition-transform">🎬</span>
                    <p id="fileNameDisplay" class="text-lg font-bold">Загрузить файл Николая (MP3/WAV)</p>
                    <p class="text-sm text-slate-400">Этот голос будет использован как эталон</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-500 uppercase">Целевой язык:</label>
                    <select id="targetLang" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-semibold">
                        <option value="ru" selected>🇷🇺 Русский</option>
                        <option value="kz">🇰🇿 Казахский</option>
                        <option value="en">🇺🇸 Английский</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-500 uppercase">Текст для озвучки:</label>
                    <input type="text" id="dubText" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4" placeholder="Что должен сказать Николай?">
                </div>
            </div>

            <button type="button" id="dubBtn" onclick="startDubbing()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 text-xl uppercase">
                Запустить Клонирование
            </button>
        </form>

        <div id="dubResult" class="mt-8 hidden border-t pt-8 animate-in fade-in slide-in-from-bottom-4">
            <audio id="audioDub" controls class="w-full h-12"></audio>
            <a id="downloadLink" href="#" download class="block text-center mt-4 text-blue-600 font-bold hover:underline">Скачать результат</a>
        </div>
    </div>
</div>

<script>
function updateFileName() {
    const fileInput = document.getElementById('mediaFile');
    const display = document.getElementById('fileNameDisplay');
    if (fileInput.files.length > 0) {
        display.innerText = "✅ Файл загружен: " + fileInput.files[0].name;
        display.classList.add('text-green-600');
    }
}

async function startDubbing() {
    const fileInput = document.getElementById('mediaFile');
    const btn = document.getElementById('dubBtn');
    const text = document.getElementById('dubText').value;

    if (!fileInput.files[0] || !text) {
        alert("Олег, загрузи аудио Николая и введи текст!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "⌛ КЛОНИРУЕМ ГОЛОС...";
    
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    formData.append('text', text);
    formData.append('target_lang', document.getElementById('targetLang').value);

    try {
        const res = await fetch('/api/dub', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.status === 'success') {
            document.getElementById('audioDub').src = data.audio_url;
            document.getElementById('downloadLink').href = data.audio_url;
            document.getElementById('dubResult').classList.remove('hidden');
        }
    } catch (err) {
        alert("Ошибка: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "Запустить Клонирование";
    }
}
</script>
{% endblock %}
