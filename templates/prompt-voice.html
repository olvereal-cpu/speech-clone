{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto py-12 px-4">
    <div class="text-center mb-12">
        <h1 class="text-5xl font-black text-slate-800 tracking-tight">
            🎭 <span class="text-purple-600">VOICE</span> DESIGNER
        </h1>
        <p class="text-slate-500 mt-2 text-lg">Создайте характер голоса с помощью промпта</p>
    </div>

    <div class="bg-white rounded-[40px] shadow-2xl border border-purple-50 p-8 lg:p-12 space-y-10">
        <div class="space-y-4">
            <label class="block text-sm font-black text-slate-400 uppercase tracking-widest">Стиль голоса:</label>
            <select id="promptType" class="w-full bg-purple-50 border-none rounded-2xl p-5 text-xl font-bold text-purple-900 focus:ring-2 focus:ring-purple-500 transition cursor-pointer">
                <option value="classic">🎙️ Классический</option>
                <option value="whisper">🤫 Шепот (Whisper)</option>
                <option value="news">📢 Диктор (News)</option>
                <option value="grumpy">😠 Ворчливый (Grumpy)</option>
                <option value="custom">✍️ Свой промпт</option>
            </select>
        </div>

        <div class="space-y-4">
            <label class="block text-sm font-black text-slate-400 uppercase tracking-widest">Текст для озвучки:</label>
            <textarea id="voiceText" rows="4" class="w-full p-5 bg-slate-50 border-none rounded-2xl text-xl shadow-inner focus:ring-2 focus:ring-purple-500 transition" placeholder="Введите текст..."></textarea>
        </div>

        <button id="generateBtn" onclick="generateVoice()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-black py-6 rounded-3xl shadow-xl transition-all transform active:scale-95 text-xl">
            СОЗДАТЬ ГОЛОС
        </button>

        <div id="voiceResult" class="hidden mt-10 pt-10 border-t border-purple-100">
            <audio id="audioVoice" controls class="w-full h-14"></audio>
        </div>
    </div>
</div>

<script>
async function generateVoice() {
    const btn = document.getElementById('generateBtn');
    const text = document.getElementById('voiceText').value;
    const type = document.getElementById('promptType').value;

    if (!text.trim()) return alert("Введите текст!");

    btn.disabled = true;
    btn.innerText = "⏳ ГЕНЕРАЦИЯ...";
    
    const formData = new FormData();
    formData.append('prompt_type', type);
    formData.append('text', text);

    try {
        const res = await fetch('/api/prompt-voice', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.status === 'success') {
            document.getElementById('audioVoice').src = data.audio_url;
            document.getElementById('voiceResult').classList.remove('hidden');
            document.getElementById('audioVoice').play();
        }
    } catch (err) {
        alert("Ошибка: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "СОЗДАТЬ ГОЛОС";
    }
}
</script>
{% endblock %}
